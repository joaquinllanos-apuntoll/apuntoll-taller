<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Apuntoll Taller</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{--g:#CC0000;--g2:#990000;--r:#CC0000;--am:#EF9F27;--bg:#f5f5f5;--card:#fff;--brd:#e0e6ed;--t:#1a1a2e;--t2:#6b7a99;--nav:#111111;--sh:0 2px 12px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--t);font-size:14px;min-height:100vh}
#ls{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#111,#333,#111);padding:20px}
.lb{background:#fff;border-radius:20px;padding:36px 32px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.lb img{display:block;margin:0 auto 8px;height:60px;object-fit:contain}
.lb p{text-align:center;font-size:12px;color:var(--t2);margin-bottom:22px}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.fg label{font-size:11px;color:var(--t2);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.fg input,.fg select,.fg textarea{padding:11px 13px;border:2px solid var(--brd);border-radius:10px;font-size:14px;color:var(--t);outline:none;width:100%;background:#fff;transition:border-color .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--g)}
.fg textarea{resize:vertical;min-height:65px}
.btn{padding:10px 16px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:2px solid var(--brd);background:#fff;color:var(--t);transition:all .15s;display:inline-flex;align-items:center;gap:6px;letter-spacing:.2px}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.1)}.btn:active{transform:scale(.97)}
.btn.primary{background:var(--g);color:#fff;border-color:var(--g2);box-shadow:0 4px 15px rgba(204,0,0,.3)}
.btn.danger{background:#CC0000;color:#fff;border-color:#990000}
.btn.warn{background:var(--am);color:#fff;border-color:#ba7517}
.btn.sm{padding:6px 11px;font-size:12px;border-radius:8px}
.btn.full{width:100%;justify-content:center}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.lerr{background:#FCEBEB;color:#791F1F;border-radius:8px;padding:9px 13px;font-size:12px;margin-bottom:12px;display:none;border-left:3px solid var(--r)}
.lsuc{background:#EAF3DE;color:#27500A;border-radius:8px;padding:9px 13px;font-size:12px;margin-bottom:12px;display:none;border-left:3px solid #4CAF50}
#as{display:none;flex-direction:column;min-height:100vh}
.tb{position:sticky;top:0;z-index:200;box-shadow:0 2px 10px rgba(0,0,0,.2)}
.tbh{display:flex;align-items:center;justify-content:space-between;padding:10px 16px}
.tbl{display:flex;align-items:center;gap:12px}
.tbl img{height:32px;object-fit:contain;cursor:pointer}
.tbu{font-size:11px;color:#aaa;display:flex;align-items:center;gap:8px}
.tbu strong{color:#fff}
.brole{padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;background:#333;color:#ccc}
.brole.admin{background:var(--g);color:#fff}.brole.superadmin{background:#CC0000;color:#fff}
.nav{display:none}
.main{padding:16px;max-width:960px;margin:0 auto;width:100%}
.pt{font-size:20px;font-weight:800;margin-bottom:16px;color:var(--t)}
.card{background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:var(--sh)}
.ct{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:7px;color:var(--t)}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg2.one{grid-template-columns:1fr}.fg2.three{grid-template-columns:1fr 1fr 1fr}
@media(max-width:520px){.fg2,.fg2.three{grid-template-columns:1fr}}
.bdg{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.bv{background:#d4edda;color:#155724}.ba{background:#fff3cd;color:#856404}
.br2{background:#f8d7da;color:#721c24}.bbl{background:#cce5ff;color:#004085}.bg2{background:#e2e3e5;color:#383d41}
.li{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:13px 15px;margin-bottom:8px;cursor:pointer;transition:all .15s;box-shadow:var(--sh)}
.li:hover{border-color:var(--g);transform:translateY(-1px);box-shadow:0 4px 16px rgba(204,0,0,.15)}
.lit{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px}
.liw{font-weight:700;font-size:13px}.lis{font-size:11px;color:var(--t2)}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px}
.sc{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:14px;text-align:center;box-shadow:var(--sh)}
.sn{font-size:26px;font-weight:800}.sl{font-size:11px;color:var(--t2);margin-top:3px;font-weight:600}
.tabs{display:flex;gap:3px;margin-bottom:16px;background:#e8edf5;padding:4px;border-radius:12px;flex-wrap:wrap}
.tab{flex:1;min-width:70px;padding:8px;text-align:center;font-size:12px;font-weight:700;cursor:pointer;border-radius:9px;color:var(--t2);border:none;background:none;transition:all .15s}
.tab.active{background:var(--card);color:var(--t);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.bk{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--t2);cursor:pointer;margin-bottom:14px;background:none;border:none;padding:0;font-weight:700}
.bk:hover{color:var(--g)}
.ir{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--brd);font-size:13px}
.ir:last-child{border-bottom:none}.ik{color:var(--t2);font-weight:600}.iv{font-weight:600;text-align:right;max-width:65%;word-break:break-word}
.fg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin-top:10px}
.fth{width:100%;aspect-ratio:1;border-radius:9px;border:2px solid var(--brd);overflow:hidden;background:#f5f7fa;display:flex;align-items:center;justify-content:center;font-size:11px;color:#999}
.fth img{width:100%;height:100%;object-fit:cover;cursor:pointer}
.acb{position:relative}
.acr{position:absolute;top:100%;left:0;right:0;background:#fff;border:2px solid var(--g);border-radius:10px;z-index:300;max-height:200px;overflow-y:auto;margin-top:3px;display:none;box-shadow:0 8px 24px rgba(0,0,0,.12)}
.acr.show{display:block}
.aci{padding:9px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid #f0f0f0}
.aci:last-child{border-bottom:none}.aci:hover{background:#fff0f0}
.aci small{display:block;font-size:11px;color:var(--t2)}
.ali{background:#fff;border:1px solid var(--brd);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px;box-shadow:var(--sh)}
.ali.urgente{border-left:4px solid var(--r)}.ali.pronto{border-left:4px solid var(--am)}.ali.azul{border-left:4px solid #CC0000}
.mi{background:#fff;border:1px solid var(--brd);border-radius:10px;padding:11px 14px;margin-bottom:7px;display:flex;align-items:center;gap:10px;box-shadow:var(--sh)}
.mi.ingreso{border-left:4px solid #4CAF50}.mi.egreso{border-left:4px solid var(--r)}
.oti{background:#f8fafc;border:1px solid var(--brd);border-radius:10px;padding:12px 13px;margin-bottom:8px}
.oth{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.otn{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px}
.tbl-m{width:100%;border-collapse:collapse;font-size:12px}
.tbl-m th{text-align:left;padding:9px 11px;border-bottom:2px solid var(--brd);color:var(--t2);font-weight:700;font-size:11px;text-transform:uppercase;background:#f8fafc}
.tbl-m td{padding:10px 11px;border-bottom:1px solid #f0f4f8;vertical-align:middle}
.tbl-m tr:hover td{background:#fff5f5}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a2e;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;z-index:999;transition:transform .25s;pointer-events:none;font-weight:700;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.toast.show{transform:translateX(-50%) translateY(0)}
#ld{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:500}
.sp{width:44px;height:44px;border:4px solid rgba(255,255,255,.2);border-top-color:#CC0000;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400;display:none;align-items:center;justify-content:center;padding:16px}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:16px;padding:22px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto}
.pres-item{display:grid;grid-template-columns:1fr auto auto auto;gap:7px;align-items:center;margin-bottom:7px}
.ing-det{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--brd)}
.ing-det.show{display:block}
.chk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:7px;margin-top:10px}
.chk-item{display:flex;align-items:center;gap:7px;padding:7px 10px;background:#f8fafc;border-radius:8px;font-size:12px;cursor:pointer;border:1px solid var(--brd);transition:all .12s}
.chk-item:hover{border-color:var(--g);background:#fff5f5}
.chk-item input{width:16px;height:16px;cursor:pointer;accent-color:var(--g)}
.chat-msg{padding:9px 13px;border-radius:12px;margin-bottom:9px;max-width:75%;font-size:13px;line-height:1.5}
.chat-msg.mine{background:var(--g);color:#fff;margin-left:auto;border-bottom-right-radius:3px}
.chat-msg.other{background:#f0f4f8;color:var(--t);margin-right:auto;border-bottom-left-radius:3px}
.chat-msg small{display:block;font-size:10px;opacity:.7;margin-top:3px}
.chat-box{height:340px;overflow-y:auto;padding:12px;border:2px solid var(--brd);border-radius:12px;background:#fafbfc;margin-bottom:12px}
.venc-ok{color:#4CAF50;font-weight:700;font-size:11px}
.venc-warn{color:var(--am);font-weight:700;font-size:11px}
.venc-exp{color:var(--r);font-weight:700;font-size:11px}
.num-badge{display:inline-block;background:#f0f4f8;color:var(--t2);font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;margin-right:5px}

/* DASHBOARD */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;margin-bottom:20px}
.dash-card{background:var(--g);border-radius:16px;padding:20px 14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:all .18s;box-shadow:0 4px 18px rgba(204,0,0,.25);min-height:130px;border:none;color:#fff;text-align:center}
.dash-card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(204,0,0,.35)}
.dash-card:active{transform:scale(.97)}
.dash-icon{font-size:36px;line-height:1}
.dash-label{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.5px}
.dash-count{font-size:11px;opacity:.85;font-weight:600;background:rgba(0,0,0,.2);padding:2px 8px;border-radius:10px}
.dash-card.dark{background:#111;box-shadow:0 4px 18px rgba(0,0,0,.3)}
.dash-card.dark:hover{box-shadow:0 8px 28px rgba(0,0,0,.4)}
.dash-card.gray{background:#555;box-shadow:0 4px 18px rgba(0,0,0,.2)}

/* TURNOS */
.turno-item{background:#fff;border:1px solid var(--brd);border-radius:12px;padding:13px 15px;margin-bottom:8px;border-left:4px solid var(--g);box-shadow:var(--sh)}
.turno-item.confirmado{border-left-color:#4CAF50}
.turno-item.cancelado{border-left-color:#999;opacity:.7}
.turno-item.completado{border-left-color:#4CAF50;background:#f0fff4}
</style>
</head>

let ME=null,TI=null,fTemp=[],presItems=[],chatInterval=null;
// Caché simple para reducir llamadas a Turso
const cache={};
function cacheGet(k){const v=cache[k];if(v&&Date.now()-v.t<30000)return v.d;return null;}
function cacheSet(k,d){cache[k]={d,t:Date.now()};}
function cacheClear(k){if(k)delete cache[k];else Object.keys(cache).forEach(x=>delete cache[x]);}

const $=id=>document.getElementById(id);
function toast(m,d=2800){const t=$('tst');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d);}
function ld(v){$('ld').style.display=v?'flex':'none'}
function fd(d){if(!d)return'—';try{const p=d.split('T')[0].split('-');return p[2]+'/'+p[1]+'/'+p[0];}catch{return d;}}
function td(){return new Date().toISOString().split('T')[0];}
function fm(n){return'$'+parseFloat(n||0).toLocaleString('es-AR',{minimumFractionDigits:0});}
function eb(v){const m={bueno:'bv',regular:'ba',malo:'br2',accidentado:'br2'};return`<span class="bdg ${m[v]||'bg2'}">${v}</span>`;}
function ob(v){const m={abierta:'bbl',en_proceso:'ba',terminada:'bv',entregada:'bg2'};const l={abierta:'Abierta',en_proceso:'En proceso',terminada:'Terminada',entregada:'Entregada'};return`<span class="bdg ${m[v]||'bg2'}">${l[v]||v}</span>`;}
function nb2(v){const m={ok:'bv',bajo:'ba',critico:'br2'};const l={ok:'OK',bajo:'Bajo',critico:'Crítico'};return`<span class="bdg ${m[v]||'bg2'}">${l[v]||v}</span>`;}
function vencBadge(f){if(!f)return'<span class="bdg bg2">Sin fecha</span>';const d=Math.ceil((new Date(f)-new Date(td()))/(864e5));if(d<0)return`<span class="venc-exp">VENCIDA</span>`;if(d<=7)return`<span class="venc-warn">Vence en ${d}d</span>`;return`<span class="venc-ok">Activa hasta ${fd(f)}</span>`;}
async function api(method,url,body){try{const o={method,headers:{'Content-Type':'application/json'}};if(body)o.body=JSON.stringify(body);const r=await fetch(url,o);return r.json();}catch(e){ld(false);toast('Error de conexión');return {ok:false,error:'Error de conexión'};}}
async function apiCached(url){const c=cacheGet(url);if(c)return c;const d=await api('GET',url);cacheSet(url,d);return d;}
function closeImgModal(){$('img-modal').classList.remove('show');}
function toggleIngDet(el){const det=el.parentElement.querySelector('.ing-det');if(det)det.classList.toggle('show');}
function openImg(src){$('img-modal-img').src=src;$('img-modal').classList.add('show');}
function goInicio(){showSec(ME&&ME.role==='superadmin'?'admin':'inicio');}

function showReg(){$('lb-login').style.display='none';$('lb-reg').style.display='block';}
function showLogin(){$('lb-login').style.display='block';$('lb-reg').style.display='none';}
async function doLogin(){
  const email=$('lem').value.trim(),pass=$('lps').value;
  const err=$('lerr');err.style.display='none';
  if(!email||!pass){err.textContent='Completá todos los campos';err.style.display='block';return;}
  ld(true);const r=await api('POST','/api/login',{email,password:pass});ld(false);
  if(!r.ok){err.textContent=r.error;err.style.display='block';return;}
  await initApp();
}
$('lps')&&$('lps').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
async function doRegistro(){
  const nom=$('r-nom').value.trim(),em=$('r-em').value.trim(),ps=$('r-ps').value;
  const err=$('rerr');err.style.display='none';
  if(!nom||!em||!ps){err.textContent='Completá nombre, email y contraseña';err.style.display='block';return;}
  ld(true);const r=await api('POST','/api/registro',{nombre:nom,email:em,password:ps,telefono:$('r-tel').value,direccion:$('r-dir').value,nombre_dueno:$('r-dno').value,dni_dueno:$('r-dni').value});ld(false);
  if(!r.ok){err.textContent=r.error;err.style.display='block';return;}
  const suc=$('rsuc');suc.textContent='¡Solicitud enviada! El administrador te activará el acceso.';suc.style.display='block';
}
async function doLogout(){if(chatInterval)clearInterval(chatInterval);await api('POST','/api/logout');ME=null;TI=null;cacheClear();$('ls').style.display='flex';$('as').style.display='none';$('lem').value='';$('lps').value='';}
async function initApp(){
  ME=await api('GET','/api/me');TI=await api('GET','/api/taller/info');
  $('ls').style.display='none';$('as').style.display='flex';
  $('unm').textContent=ME.nombre;$('tnm').textContent=TI.nombre||'';
  const rb=$('urb');rb.textContent=ME.role==='superadmin'?'Super Admin':ME.role==='admin'?'Admin':'Operario';
  rb.className='brole '+(ME.role==='superadmin'?'superadmin':ME.role==='admin'?'admin':'');
  applyPersonalizacion();showSec(ME.role==='superadmin'?'admin':'inicio');
  startChatPoll();
}
function applyPersonalizacion(){
  const tb=$('topbar');if(TI.color_nav)tb.style.background=TI.color_nav;
  if(TI.color_fondo)document.body.style.background=TI.color_fondo;
  if(TI.color_primario){
    document.documentElement.style.setProperty('--g',TI.color_primario);
    document.documentElement.style.setProperty('--g2',TI.color_primario);
    document.documentElement.style.setProperty('--r',TI.color_primario);
  }
  const nl=$('nav-logo');if(TI.logo&&TI.logo.length>10)nl.src=TI.logo;else nl.src=LOGO_DEF;
}
async function startChatPoll(){
  if(chatInterval)clearInterval(chatInterval);
  chatInterval=setInterval(async()=>{
    if(!ME)return;
    if(ME.role!=='superadmin'){
      const r=await api('GET','/api/chat/unread/count').catch(()=>({count:0}));
    }
  },30000);
}

// NAV — oculto, navegación por dashboard
function showSec(s){
  const rs={admin:rAdmin,admineco:rAdminEco,chats:rChats,inicio:rInicio,ingreso:rIngreso,veh:rVeh,cli:rCli,ot:rOT,pres:rPres,eco:rEco,alertas:rAlertas,usr:rUsr,person:rPerson,perfil:rPerfil,chat:()=>rChat(ME.tallerId),turnos:rTurnos,planner:rPlanner};
  if(rs[s])rs[s]();
}

    </div>
    ${pend.length?`<div class="card" style="border-left:4px solid var(--am)"><div class="ct">⏳ Solicitudes pendientes</div>

function filtrarT(q){const t=$('tbl-t');if(!t||!t._ts)return;const f=q?t._ts.filter(x=>x.nombre.toLowerCase().includes(q.toLowerCase())||x.email.toLowerCase().includes(q.toLowerCase())):t._ts;$('tbody-t').innerHTML=rTablaTalleres(f);}

function renovarModal(id,nom,montoActual){

async function renovarSus(id,overlay){

  $('ld').style.display='none';
  try{
    await api('POST',`/api/admin/talleres/${id}/renovar`,{monto:mo,suscripcion_hasta:fe});
    overlay.remove();toast('Suscripción renovada ✓');

async function aprobarTaller(id){

  $('ld').style.display='none';
  try{
    await api('PUT',`/api/admin/talleres/${id}/aprobar`,{suscripcion_hasta:sus});
    if(mo&&parseFloat(mo)>0) await api('POST',`/api/admin/talleres/${id}/renovar`,{monto:mo,suscripcion_hasta:sus});

}

async function aeTab(t){
  document.querySelectorAll('#mc .tab').forEach((x,i)=>x.classList.toggle('active',(t==='m'&&i===0)||(t==='n'&&i===1)||(t==='r'&&i===2)));
  const ei=$('ae-i');

    const M=await api('GET','/api/admin/movimientos');
    const mes=td().substring(0,7);const mm=M.filter(m=>m.fecha&&m.fecha.startsWith(mes));
    const ing=mm.filter(m=>m.tipo==='ingreso').reduce((a,m)=>a+m.monto,0);
    const eg=mm.filter(m=>m.tipo==='egreso').reduce((a,m)=>a+m.monto,0);
    ei.innerHTML=`<div class="sg">
      <div class="sc"><div class="sn" style="color:#4CAF50">${fm(ing)}</div><div class="sl">Ingresos mes</div></div>
      <div class="sc"><div class="sn" style="color:var(--r)">${fm(eg)}</div><div class="sl">Egresos mes</div></div>

    </div><div id="ae-ml">${rAML(M)}</div>`;
  } else if(t==='n'){
    const TS=await api('GET','/api/admin/talleres');
    ei.innerHTML=`<div class="card"><div class="ct">Registrar movimiento</div>
      <div class="fg2">
        <div class="fg"><label>Tipo</label><select id="am-tp"><option value="ingreso">Ingreso</option><option value="egreso">Egreso</option></select></div>
        <div class="fg"><label>Fecha</label><input type="date" id="am-fe" value="${td()}"></div>
        <div class="fg"><label>Categoría</label><select id="am-ca"><option value="suscripcion">Suscripción</option><option value="servidor">Servidor</option><option value="desarrollo">Desarrollo</option><option value="otros">Otros</option></select></div>
        <div class="fg"><label>Monto ($)</label><input type="number" id="am-mo"></div>
        <div class="fg"><label>Taller</label><select id="am-tl"><option value="">-- General --</option>${TS.map(t=>`<option value="${t.id}">${t.nombre}</option>`).join('')}</select></div>
        <div class="fg"><label>Descripción</label><input type="text" id="am-de"></div>
      </div>
      <div class="btn-row"><button class="btn primary" onclick="saveAM()">Guardar</button></div>
    </div>`;
  } else {
    const M=await api('GET','/api/admin/movimientos');const meses={};
    M.forEach(m=>{if(!m.fecha)return;const k=m.fecha.substring(0,7);if(!meses[k])meses[k]={i:0,e:0};meses[k][m.tipo==='ingreso'?'i':'e']+=m.monto;});
    ei.innerHTML=Object.keys(meses).sort().reverse().map(k=>{const d=meses[k];const b=d.i-d.e;return`<div class="card"><div style="font-weight:800;margin-bottom:10px">${k}</div><div class="ir"><span class="ik">Ingresos</span><span class="iv" style="color:#4CAF50">${fm(d.i)}</span></div><div class="ir"><span class="ik">Egresos</span><span class="iv" style="color:var(--r)">${fm(d.e)}</span></div><div class="ir"><span class="ik">Balance</span><span class="iv" style="color:${b>=0?'#4CAF50':'var(--r)'};">${fm(b)}</span></div></div>`;}).join('')||'<p style="text-align:center;color:var(--t2);padding:20px">Sin datos</p>';
  }
}
function rAML(ms){if(!ms.length)return`<div style="text-align:center;padding:20px;color:var(--t2)">Sin movimientos</div>`;return[...ms].reverse().map(m=>`<div class="mi ${m.tipo}"><div style="flex:1"><div style="font-weight:600">${m.descripcion||m.categoria}</div><div style="font-size:11px;color:var(--t2)">${fd(m.fecha)} · ${m.categoria}</div></div><div style="font-size:15px;font-weight:800;color:${m.tipo==='ingreso'?'#4CAF50':'var(--r)'}">${m.tipo==='ingreso'?'+':'-'}${fm(m.monto)}</div><button class="btn sm danger" onclick="delAM('${m.id}')" style="margin-left:4px">×</button></div>`).join('');}

async function iAuto(){
  const q=$('isch').value.trim().toLowerCase();const ac=$('iacr');
  if(q.length<1){ac&&ac.classList.remove('show');return;}
  const CS=$('isch')._cs||[];const VS=await apiCached('/api/vehiculos');
  const mm=[];
  CS.forEach(c=>{if(c.nombre.toLowerCase().includes(q)){const au=VS.filter(v=>v.cliente_id===c.id);if(au.length)au.forEach(v=>mm.push({lb:c.nombre,sub:v.patente+' — '+[v.marca,v.modelo].filter(Boolean).join(' '),pat:v.patente,cid:c.id,v}));else mm.push({lb:c.nombre,sub:'Sin autos',pat:'',cid:c.id,v:null});}});
  VS.forEach(v=>{if((v.patente.toLowerCase().includes(q)||(v.marca&&v.marca.toLowerCase().includes(q)))&&!mm.find(m=>m.pat===v.patente))mm.push({lb:v.patente,sub:[v.marca,v.modelo].filter(Boolean).join(' ')+(v.cliente_nombre?' — '+v.cliente_nombre:''),pat:v.patente,cid:v.cliente_id,v});});
  if(!mm.length){ac&&ac.classList.remove('show');return;}
  ac.innerHTML=mm.slice(0,6).map((m,i)=>`<div class="aci" onclick="fillI(${i})"><strong>${m.lb}</strong><small>${m.sub}</small></div>`).join('');
  ac._m=mm;ac.classList.add('show');
}
function fillI(i){
  const ac=$('iacr');if(!ac)return;const m=ac._m[i];ac.classList.remove('show');
  if($('isch'))$('isch').value='';
  if(m.pat&&$('ipa'))$('ipa').value=m.pat;
  if(m.v){
    if(m.v.marca&&$('ima'))$('ima').value=m.v.marca;
    if(m.v.modelo&&$('imo'))$('imo').value=m.v.modelo;
    if(m.v.anio&&$('ian'))$('ian').value=m.v.anio;
    if(m.v.ultimo_km&&$('ikm'))$('ikm').value=m.v.ultimo_km;
  }
  if(m.cid&&$('icl'))$('icl').value=m.cid;
  const b=$('iai');if(b){b.style.display='block';b.innerHTML='✓ Datos cargados: <strong>'+m.lb+'</strong>'+(m.pat?' — '+m.pat:'');}
}
function addF(ev,cid){
  Array.from(ev.target.files).forEach(f=>{
    const r=new FileReader();
    r.onload=e=>{
      fTemp.push(e.target.result);
      const c=$(cid);const d=document.createElement('div');d.className='fth';
      d.innerHTML=`<img src="${e.target.result}" onclick="openImg(this.src)">`;c.appendChild(d);
    };r.readAsDataURL(f);
  });
}
async function saveIng(){
  const pat=($('ipa')||{value:''}).value.trim().toUpperCase();const tr=($('itr')||{value:''}).value.trim();const fe=($('ife')||{value:''}).value;
  if(!pat||!tr||!fe){toast('Completá patente, fecha y trabajos');return;}
  ld(true);const r=await api('POST','/api/ingresos',{patente:pat,fecha:fe,marca:$('ima').value.trim(),modelo:$('imo').value.trim(),anio:$('ian').value,km:parseInt($('ikm').value)||0,cliente_id:$('icl').value,estado:$('ies').value,aceite:$('iac').value,refrigerante:$('ire').value,frenos:$('ifr').value,liq_frenos:$('ilf').value,trabajos:tr,obs:$('iob').value,fotos:fTemp});
  ld(false);cacheClear('/api/ingresos');cacheClear('/api/vehiculos');
  if(!r.ok){toast(r.error);return;}toast('Ingreso guardado ✓');goInicio();
}

const CHECKLIST_ITEMS=['Cambio de aceite','Filtro de aceite','Filtro de aire','Filtro de habitáculo','Filtro de combustible','Bujías','Refrigerante','Líquido de frenos','Pastillas delanteras','Pastillas traseras','Discos delanteros','Discos traseros','Correa de distribución','Bomba de agua','Escobillas limpiaparabrisas','Batería','Revisión de luces'];
function renderChecklist(vals={}){return`<div class="chk-grid">${CHECKLIST_ITEMS.map(it=>`<label class="chk-item"><input type="checkbox" ${vals[it]?'checked':''} onchange="updChk('${it}',this.checked)"> ${it}</label>`).join('')}</div>`;}
let chkState={};
function updChk(k,v){chkState[k]=v;}
function getChkState(){return {...chkState};}
let itemsMO=[],itemsRT=[],itemsRE=[];
function renderItems(items,arrKey,containerId){
  const c=$(containerId);if(!c)return;
  c.innerHTML=items.map((it,i)=>`<div class="pres-item">
    <input type="text" placeholder="Descripción" value="${it.desc||''}" style="padding:8px 11px;border:2px solid var(--brd);border-radius:9px;font-size:13px" oninput="updItem('${arrKey}',${i},'desc',this.value)">
    <input type="number" placeholder="Cant." value="${it.cantidad||1}" style="padding:8px;border:2px solid var(--brd);border-radius:9px;font-size:13px;width:65px" oninput="updItem('${arrKey}',${i},'cantidad',this.value)">
    <input type="number" placeholder="Precio" value="${it.precio||''}" style="padding:8px;border:2px solid var(--brd);border-radius:9px;font-size:13px;width:105px" oninput="updItem('${arrKey}',${i},'precio',this.value);recalcOT()">
    <button class="btn sm danger" onclick="delItem('${arrKey}',${i})">×</button>
  </div>`).join('')+`<button class="btn sm primary" onclick="addItem('${arrKey}','${containerId}')" style="margin-top:5px">+ Agregar</button>`;
}
function addItem(arrKey,cid){getArr(arrKey).push({desc:'',cantidad:1,precio:0});renderItems(getArr(arrKey),arrKey,cid);}
function delItem(arrKey,i){getArr(arrKey).splice(i,1);const cids={itemsMO:'items-mo-c',itemsRT:'items-rt-c',itemsRE:'items-re-c'};renderItems(getArr(arrKey),arrKey,cids[arrKey]);recalcOT();}
function updItem(arrKey,i,k,v){getArr(arrKey)[i][k]=k==='desc'?v:parseFloat(v)||0;}
function getArr(k){return k==='itemsMO'?itemsMO:k==='itemsRT'?itemsRT:itemsRE;}
function sumItems(arr){return arr.reduce((a,it)=>a+(parseFloat(it.precio)||0)*(parseFloat(it.cantidad)||1),0);}
function recalcOT(){
  const mo=sumItems(itemsMO);const rt=sumItems(itemsRT);const re=sumItems(itemsRE);
  const extra=parseFloat(($('ot-extra')||{value:0}).value)||0;
  const adelanto=parseFloat(($('ot-adelanto')||$('eo-adelanto')||{value:0}).value)||0;
  const tot=mo+rt+re+extra;
  const saldo=Math.max(0,tot-adelanto);
  if($('ot-mo-total'))$('ot-mo-total').textContent=fm(mo);
  if($('ot-rt-total'))$('ot-rt-total').textContent=fm(rt);
  if($('ot-re-total'))$('ot-re-total').textContent=fm(re);
  if($('ot-total-disp'))$('ot-total-disp').textContent=fm(tot);
  if($('ot-adelanto-disp'))$('ot-adelanto-disp').textContent=fm(adelanto);
  if($('ot-saldo-disp'))$('ot-saldo-disp').textContent=fm(saldo);
}

        <div style="font-size:12px;color:var(--t2);font-weight:700">${t.hora}${t.horafin?' → '+t.horafin:''} ${t.empleado?'· '+t.empleado:''}</div>
        <div style="font-size:14px;font-weight:700;margin-top:3px;${t.completada?'text-decoration:line-through;color:#999':t.cancelada?'text-decoration:line-through;color:#bbb':''}">${t.descripcion}</div>
        ${t.patente?`<div style="font-size:11px;color:var(--t2);margin-top:2px">🚗 ${t.patente}</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;gap:5px">
        ${!t.completada&&!t.cancelada?`<button class="btn sm primary" onclick="planToggle(${idx},'completada')" title="Completar">✓</button>`:''}
        ${!t.cancelada&&!t.completada?`<button class="btn sm" onclick="planToggle(${idx},'cancelada')" title="Cancelar">✕</button>`:''}
        ${t.completada||t.cancelada?`<button class="btn sm warn" onclick="planRestaurar(${idx})" title="Restaurar">↩</button>`:''}
        <button class="btn sm warn" onclick="planEditarModal(${idx})" title="Editar">✏️</button>
        <button class="btn sm danger" onclick="planEliminar(${idx},this)" title="Eliminar">🗑</button>
      </div>
    </div>
    ${t.completada?'<div style="font-size:11px;color:#4CAF50;margin-top:4px;font-weight:700">✓ Completada</div>':''}
    ${t.cancelada?'<div style="font-size:11px;color:#999;margin-top:4px;font-weight:700">✕ Cancelada</div>':''}
  </div>`;}).join('');
}

function planMostrarSemana(lunes){
  const c=$('plan-semana-c');if(!c)return;
  const dias=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  let html='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:8px;overflow-x:auto">';
  for(let d=0;d<7;d++){
    const fecha=new Date(lunes);fecha.setDate(lunes.getDate()+d);
    const fStr=fecha.toISOString().split('T')[0];
    const tareas=plannerTareas.filter(t=>t.fecha===fStr);
    const esHoy=fStr===new Date().toISOString().split('T')[0];
    const mesesS=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    html+=`<div style="background:${esHoy?'var(--g)':'#f8fafc'};color:${esHoy?'#fff':'var(--t)'};border-radius:10px;padding:10px;min-height:120px;border:1px solid var(--brd)">
      <div style="font-weight:800;font-size:12px;margin-bottom:2px">${dias[d]} ${fecha.getDate()}</div>
      <div style="font-size:10px;opacity:.7;margin-bottom:6px">${mesesS[fecha.getMonth()]} ${fecha.getFullYear()}</div>
      ${tareas.slice(0,4).map(t=>`<div style="font-size:10px;background:${t.completada?'rgba(76,175,80,.2)':t.cancelada?'rgba(200,200,200,.3)':'rgba(255,255,255,.85)'};border-radius:5px;padding:3px 5px;margin-bottom:3px;${esHoy?'color:#333':''}">
        <span style="font-weight:700">${t.hora}</span> ${(t.descripcion||'').substring(0,18)}${t.descripcion&&t.descripcion.length>18?'...':''}
      </div>`).join('')}
      ${tareas.length>4?`<div style="font-size:10px;opacity:.7">+${tareas.length-4} más</div>`:''}
    </div>`;
  }
  html+='</div>';
  const viernes=new Date(lunes);viernes.setDate(lunes.getDate()+6);
  const mesesLbl=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const lblSemana=lunes.getMonth()===viernes.getMonth()?`${mesesLbl[lunes.getMonth()]} ${lunes.getFullYear()}`:`${mesesLbl[lunes.getMonth()]} — ${mesesLbl[viernes.getMonth()]} ${viernes.getFullYear()}`;
  html+=`<div style="display:flex;gap:8px;margin-top:10px;justify-content:space-between;align-items:center;flex-wrap:wrap">
    <button class="btn sm" onclick="planSemanaAnterior('${lunes.toISOString().split('T')[0]}')">◀ Anterior</button>
    <span style="font-weight:700;font-size:13px">${lblSemana}</span>
    <button class="btn sm" onclick="planSemanaSiguiente('${lunes.toISOString().split('T')[0]}')">Siguiente ▶</button>
  </div>`;
  c.innerHTML=html;
}
function planSemanaAnterior(lunStr){const l=new Date(lunStr);l.setDate(l.getDate()-7);planMostrarSemana(l);}
function planSemanaSiguiente(lunStr){const l=new Date(lunStr);l.setDate(l.getDate()+7);planMostrarSemana(l);}
function planAgregar(){
  const des=($('pt-des')||{value:''}).value.trim();
  const fe=($('pt-fe')||{value:''}).value;
  const ho=($('pt-ho')||{value:''}).value;
  if(!des||!fe||!ho){toast('Descripción, fecha y hora son obligatorias');return;}

  plannerTareas.push({id:Date.now(),fecha:fe,hora:ho,horafin:($('pt-hf')||{value:''}).value,empleado:($('pt-emp')||{value:''}).value.trim(),descripcion:des,patente:($('pt-pat')||{value:''}).value.toUpperCase().trim(),completada:false,cancelada:false});

function planToggle(idx,campo){if(idx<0||idx>=plannerTareas.length)return;plannerTareas[idx][campo]=true;plannerSave();const f=$('plan-fecha');planMostrarDia(f?f.value:plannerTareas[idx].fecha);}
function planRestaurar(idx){if(idx<0||idx>=plannerTareas.length)return;plannerTareas[idx].completada=false;plannerTareas[idx].cancelada=false;plannerSave();const f=$('plan-fecha');planMostrarDia(f?f.value:plannerTareas[idx].fecha);}
function planEliminar(idx,btn){if(!confirm('¿Eliminar esta tarea?'))return;plannerTareas.splice(idx,1);plannerSave();const f=$('plan-fecha');planMostrarDia(f?f.value:new Date().toISOString().split('T')[0]);}

async function sincronizarOT(){
  if(!confirm('Esto va a registrar los movimientos de todas las OT que no tienen movimiento aún. ¿Continuar?'))return;
  ld(true);
  const [OS,MS]=await Promise.all([api('GET','/api/ordenes'),api('GET','/api/movimientos')]);
  const ordenesConMov=new Set(MS.filter(m=>m.orden_id).map(m=>m.orden_id));
  let agregadas=0;
  for(const o of OS){
    if(ordenesConMov.has(o.id))continue;
    const mo=JSON.parse(o.items_mano_obra||'[]');
    const rt=JSON.parse(o.items_repuestos_taller||'[]');
    const total=(parseFloat(o.mano_obra)||0)+(parseFloat(o.costo_repuestos_taller)||0);
    if(total>0){
      await api('POST','/api/movimientos',{tipo:'ingreso',fecha:o.fecha,categoria:'mano_obra',monto:total,descripcion:'OT N°'+(o.numero||'?')+' — '+o.patente,orden_id:o.id});
      agregadas++;
    }
  }
  ld(false);
  toast(agregadas>0?`${agregadas} OT sincronizadas ✓`:'No hay OT pendientes de sincronizar');
  eTab('m');
}

function rMovL(ms){if(!ms.length)return`<div style="text-align:center;padding:20px;color:var(--t2)">Sin movimientos</div>`;return[...ms].reverse().map(m=>`<div class="mi ${m.tipo}"><div style="flex:1"><div style="font-weight:700">${m.descripcion||m.categoria}</div><div style="font-size:11px;color:var(--t2)">${fd(m.fecha)} · ${m.categoria}</div></div><div style="font-size:16px;font-weight:900;color:${m.tipo==='ingreso'?'#4CAF50':'var(--r)'}">${m.tipo==='ingreso'?'+':'-'}${fm(m.monto)}</div><button class="btn sm danger" onclick="delMov('${m.id}')" style="margin-left:5px">×</button></div>`).join('');}
function fMovs(){const ei=$('ei');if(!ei||!ei._ms)return;const tp=($('eftp')||{value:''}).value;const ms=($('efms')||{value:''}).value;let f=ei._ms;if(tp)f=f.filter(m=>m.tipo===tp);if(ms)f=f.filter(m=>m.fecha&&m.fecha.startsWith(ms));$('lmov').innerHTML=rMovL(f);}
async function saveMov(){const mo=parseFloat(($('mmo')||{value:''}).value);const fe=($('mfe')||{value:''}).value;if(!mo||!fe){toast('Completá monto y fecha');return;}ld(true);await api('POST','/api/movimientos',{tipo:$('mtp').value,fecha:fe,categoria:$('mca').value,monto:mo,descripcion:$('mde').value,orden_id:$('mot').value});ld(false);toast('Guardado ✓');eTab('m');}

      <div class="fg"><label>Período</label><select id="egf-per"><option value="mensual" ${perTipo==='mensual'?'selected':''}>Mensual</option><option value="bimestral" ${perTipo==='bimestral'?'selected':''}>Bimestral</option><option value="trimestral" ${perTipo==='trimestral'?'selected':''}>Trimestral</option><option value="semestral" ${perTipo==='semestral'?'selected':''}>Semestral</option><option value="anual" ${perTipo==='anual'?'selected':''}>Anual</option></select></div>

async function alTab(t){
  document.querySelectorAll('#mc .tab').forEach((x,i)=>x.classList.toggle('active',(t==='l'&&i===0)||(t==='n'&&i===1)||(t==='km'&&i===2)));

        <div style="flex:1">
          <div style="font-size:14px;font-weight:800">${a.patente}${a.fecha_alerta?' — <span style="color:var(--g)">'+fd(a.fecha_alerta)+'</span>':''}</div>

          ${a.aceite_usado?`<div style="font-size:11px;color:var(--t2);margin-top:2px">🛢 ${a.aceite_usado}</div>`:''}
          ${a.filtros_cambiados?`<div style="font-size:11px;color:var(--t2)">🔧 ${a.filtros_cambiados}</div>`:''}
          ${a.notas?`<div style="font-size:11px;color:var(--t2)">${a.notas}</div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;gap:5px">
          <button class="btn sm primary" onclick="resolverAlerta('${a.id}')">✓ Resolver</button>
          <button class="btn sm danger" onclick="delAlerta('${a.id}')">Eliminar</button>
        </div>
      </div>`).join('')||'<div style="text-align:center;padding:30px;color:var(--t2)">Sin alertas</div>');
    // FIX: reemplazar template string con fd() real
    c.querySelectorAll('.ali').forEach((el,i)=>{
      if(AL[i]&&AL[i].fecha_alerta){
        el.querySelector('.liw,div div')&&(el.innerHTML=el.innerHTML);
      }
    });
  } else if(t==='n'){
    c.innerHTML=`<div class="card"><div class="ct">Nueva alerta</div>
      <div class="fg2">
        <div class="fg acb"><label>Patente</label>
          <input type="text" id="al-pat" style="text-transform:uppercase;font-weight:700" autocomplete="off" oninput="alPatAuto()" placeholder="ABC 123">
          <div class="acr" id="al-ac"></div>
        </div>
        <div class="fg"><label>Teléfono del dueño</label><input type="tel" id="al-tel" placeholder="11-1234-5678"></div>
        <div class="fg"><label>Fecha de alerta</label><input type="date" id="al-fe"></div>
        <div class="fg"><label>Aceite utilizado</label><input type="text" id="al-aceite" placeholder="Castrol 10W40..."></div>
        <div class="fg one"><label>Filtros cambiados</label><input type="text" id="al-filtros" placeholder="Aceite, aire, habitáculo..."></div>
        <div class="fg one"><label>Notas</label><input type="text" id="al-notas"></div>
      </div>
      <div class="btn-row"><button class="btn primary" onclick="saveAlerta()">Guardar alerta</button></div>
    </div>`;
  } else {
    const [VS,GS]=await Promise.all([apiCached('/api/vehiculos'),apiCached('/api/guiakm')]);
    const alKm=getAlKm(VS);
    c.innerHTML=`${alKm.length?`<div class="card"><div class="ct">⚠️ Aceite próximo</div>${alKm.map(a=>`<div class="ali ${a.tipo}"><div>${a.tipo==='urgente'?'🔴':'🟡'}</div><div><div style="font-weight:700">${a.pat}</div><div style="font-size:12px;color:var(--t2)">${a.msg}</div></div></div>`).join('')}</div>`:''}
    <div class="card"><div class="ct">🛢 Guía de cambio de aceite</div>
      ${GS.map(g=>`<div class="ir"><span class="ik">${g.tipo}</span><span class="iv" style="display:flex;align-items:center;gap:8px"><strong>${parseInt(g.km).toLocaleString()} km</strong><button class="btn sm danger" onclick="delGuia('${g.id}')">×</button></span></div>`).join('')}
      <div class="fg2" style="margin-top:12px">
        <div class="fg"><label>Tipo de aceite</label><input type="text" id="gti" placeholder="Sintético 10W40"></div>
        <div class="fg"><label>Km intervalo</label><input type="number" id="gkm" placeholder="10000"></div>
      </div>
      <div class="btn-row"><button class="btn sm primary" onclick="addGuia()">+ Agregar</button></div>
    </div>`;
  }
}
function getAlKm(vs){const a=[];vs.forEach(v=>{if(v.proximo_aceite&&v.ultimo_km){const d=parseInt(v.proximo_aceite)-parseInt(v.ultimo_km);if(d<=0)a.push({tipo:'urgente',pat:v.patente,msg:'Cambio VENCIDO'});else if(d<=1000)a.push({tipo:'urgente',pat:v.patente,msg:'Cambio en '+d.toLocaleString()+' km'});else if(d<=3000)a.push({tipo:'pronto',pat:v.patente,msg:'Próximo en '+d.toLocaleString()+' km'});}});return a;}
async function alPatAuto(){
  const q=($('al-pat')||{value:''}).value.toUpperCase();const ac=$('al-ac');
  if(!ac||q.length<2){ac&&ac.classList.remove('show');return;}
  const VS=await apiCached('/api/vehiculos');const mm=VS.filter(v=>v.patente.includes(q));
  if(mm.length){ac.innerHTML=mm.slice(0,5).map(v=>{const tel=v.cliente_tel||'';return`<div class="aci" onclick="alFill('${v.patente}','${tel}')"><strong>${v.patente}</strong><small>${[v.marca,v.modelo].filter(Boolean).join(' ')}${v.cliente_nombre?' — '+v.cliente_nombre:''}${tel?' — 📞 '+tel:''}</small></div>`;}).join('');ac.classList.add('show');}else ac.classList.remove('show');
}
function alFill(pat,tel){if($('al-pat'))$('al-pat').value=pat;if($('al-tel')&&tel)$('al-tel').value=tel;if($('al-ac'))$('al-ac').classList.remove('show');}
async function saveAlerta(){
  const pat=($('al-pat')||{value:''}).value.trim().toUpperCase();if(!pat){toast('Ingresá la patente');return;}
  await api('POST','/api/alertas',{patente:pat,telefono_dueno:$('al-tel').value,tipo:'fecha',fecha_alerta:$('al-fe').value,aceite_usado:$('al-aceite').value,filtros_cambiados:$('al-filtros').value,notas:$('al-notas').value});
  toast('Alerta guardada ✓');alTab('l');
}
async function resolverAlerta(id){await api('PUT',`/api/alertas/${id}`,{resuelta:true});toast('Resuelta ✓');alTab('l');}
async function delAlerta(id){await api('DELETE',`/api/alertas/${id}`);alTab('l');}
async function addGuia(){const t=($('gti')||{value:''}).value.trim();const k=parseInt(($('gkm')||{value:''}).value);if(!t||!k){toast('Completá tipo y km');return;}await api('POST','/api/guiakm',{tipo:t,km:k});cacheClear('/api/guiakm');toast('Guardado ✓');alTab('km');}
async function delGuia(id){await api('DELETE',`/api/guiakm/${id}`);cacheClear('/api/guiakm');alTab('km');}

// PDFs
const { jsPDF } = window.jspdf;

function getPDFColor(){
  const c=getComputedStyle(document.documentElement).getPropertyValue('--g').trim()||'#CC0000';
  const r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);
  return[r||204,g||0,b||0];
}

// Agrega números de página a todos los PDFs
function pdfAddPageNumbers(doc){
  const total=doc.internal.getNumberOfPages();
  const W=doc.internal.pageSize.getWidth();
  const H=doc.internal.pageSize.getHeight();
  for(let i=1;i<=total;i++){
    doc.setPage(i);
    doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(160,160,160);
    doc.text(`Página ${i} de ${total}`,W-14,H-6,{align:'right'});
    doc.setDrawColor(220,228,235);doc.line(14,H-10,W-14,H-10);
  }
}

// Verifica si hay espacio; si no, agrega nueva página y rehace header
function pdfCheckPage(doc,y,needed,taller,titulo,subtitulo){
  const H=doc.internal.pageSize.getHeight();
  if(y+needed>H-18){
    doc.addPage();
    y=pdfHeader(doc,taller,titulo,subtitulo||'(cont.)');
  }
  return y;
}

function pdfHeader(doc,taller,titulo,num=''){
  const W=doc.internal.pageSize.getWidth();
  const [cr,cg,cb]=getPDFColor();
  // Header más alto para dar espacio
  doc.setFillColor(cr,cg,cb);doc.rect(0,0,W,42,'F');
  // Logo más grande y con más espacio
  const logoSrc=(taller.logo&&taller.logo.length>10)?taller.logo:null;
  if(logoSrc){try{doc.addImage(logoSrc,'PNG',6,4,32,34);}catch(e){}}
  const lx=logoSrc?42:12;
  // Nombre del taller — grande y legible
  doc.setFont('helvetica','bold');doc.setFontSize(16);doc.setTextColor(255,255,255);
  doc.text(taller.nombre||'Taller',lx,14);
  // Dirección
  if(taller.direccion){doc.setFontSize(10);doc.setFont('helvetica','normal');doc.setTextColor(255,220,220);doc.text(taller.direccion,lx,22);}
  // Teléfono + email
  const contacto=[taller.telefono?'Tel: '+taller.telefono:null,taller.email||null].filter(Boolean).join('   ');
  if(contacto){doc.setFontSize(9);doc.setTextColor(255,230,230);doc.text(contacto,lx,30);}
  // Título del documento — grande y destacado
  doc.setFont('helvetica','bold');doc.setFontSize(20);doc.setTextColor(255,255,255);
  doc.text(titulo,W-10,17,{align:'right'});
  // Número — bien visible
  if(num){doc.setFontSize(13);doc.setFont('helvetica','bold');doc.setTextColor(255,230,180);doc.text(num,W-10,30,{align:'right'});}
  doc.setTextColor(20,20,20);
  return 50;
}

function pdfLinea(doc,y,label,val,W){
  doc.setFillColor(248,250,252);doc.rect(14,y-4,W-28,7,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(80,95,120);doc.text(label,16,y);
  doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(20,20,20);doc.text(String(val||'—'),W-14,y,{align:'right'});
  doc.setDrawColor(220,228,235);doc.line(14,y+2,W-14,y+2);return y+8;
}

function pdfSeccion(doc,y,titulo,color){
  const W=doc.internal.pageSize.getWidth();
  const col=color||getPDFColor();
  doc.setFillColor(col[0],col[1],col[2]);doc.rect(14,y-4,W-28,8,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(255,255,255);
  doc.text(titulo,17,y+1);return y+10;
}

function pdfTotal(doc,y,monto,label='TOTAL A COBRAR'){
  const W=doc.internal.pageSize.getWidth();
  const [cr,cg,cb]=getPDFColor();
  doc.setFillColor(cr,cg,cb);doc.roundedRect(14,y-2,W-28,14,3,3,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(14);doc.setTextColor(255,255,255);
  doc.text(label,17,y+8);
  doc.text('$ '+parseFloat(monto||0).toLocaleString('es-AR',{minimumFractionDigits:0}),W-14,y+8,{align:'right'});
  return y+20;
}

async function genRem(otId){
  ld(true);
  const [OS,VS,CS,TI2]=await Promise.all([api('GET','/api/ordenes'),apiCached('/api/vehiculos'),apiCached('/api/clientes'),api('GET','/api/taller/info')]);
  const o=OS.find(x=>x.id===otId);ld(false);if(!o){toast('OT no encontrada');return;}
  const v=VS.find(x=>x.patente===o.patente);
  const cli=(v&&v.cliente_id)?CS.find(x=>x.id===v.cliente_id):null;
  const mo=JSON.parse(o.items_mano_obra||'[]');
  const rt=JSON.parse(o.items_repuestos_taller||'[]');
  const re=JSON.parse(o.items_repuestos_externos||'[]');
  const chk=JSON.parse(o.checklist||'{}');
  const doc=new jsPDF();const W=doc.internal.pageSize.getWidth();
  const [cr,cg,cb]=getPDFColor();
  let y=pdfHeader(doc,TI2,'REMITO',`OT-${o.numero||'?'}`);

  // Bloque taller + cliente lado a lado
  const midX=W/2;
  doc.setFillColor(248,248,248);doc.rect(14,y,midX-18,32,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(cr,cg,cb);doc.text('TALLER',16,y+7);
  doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(30,30,30);
  doc.text(TI2.nombre||'',16,y+14);
  if(TI2.direccion)doc.text(TI2.direccion,16,y+20);
  if(TI2.telefono)doc.text('Tel: '+TI2.telefono,16,y+26);
  if(TI2.email)doc.text(TI2.email,16,y+31);

  doc.setFillColor(255,248,248);doc.rect(midX-2,y,midX-12,32,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(cr,cg,cb);doc.text('CLIENTE',midX,y+7);
  doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(30,30,30);
  if(cli){
    doc.text(cli.nombre||'',midX,y+14);
    if(cli.dni)doc.text('DNI: '+cli.dni,midX,y+20);
    if(cli.telefono)doc.text('Tel: '+cli.telefono,midX,y+(cli.dni?26:20));
    if(cli.email)doc.text(cli.email,midX,y+(cli.dni?31:26));
  } else {
    doc.text('Sin cliente registrado',midX,y+14);
  }
  y+=38;

  // Datos del vehículo
  y=pdfSeccion(doc,y,'Datos del vehículo');
  y=pdfLinea(doc,y,'Patente',o.patente,W);
  const vDesc=[v?v.marca:o.marca,v?v.modelo:o.modelo,v?v.anio:o.anio].filter(Boolean).join(' ');
  if(vDesc)y=pdfLinea(doc,y,'Vehículo',vDesc,W);
  y=pdfLinea(doc,y,'Fecha',fd(o.fecha),W);
  if(o.tecnico)y=pdfLinea(doc,y,'Técnico',o.tecnico,W);
  if(o.km_egreso)y=pdfLinea(doc,y,'Km al egreso',parseInt(o.km_egreso).toLocaleString()+' km',W);
  y+=4;

  // Aceite utilizado
  if(o.aceite_usado){
    y=pdfCheckPage(doc,y,16,TI2,'REMITO',`OT-${o.numero||'?'}`);
    y=pdfSeccion(doc,y,'Aceite utilizado',[180,120,20]);
    y=pdfLinea(doc,y,'Aceite',o.aceite_usado,W);y+=2;
  }

  // Descripción de trabajos
  y=pdfCheckPage(doc,y,20,TI2,'REMITO',`OT-${o.numero||'?'}`);
  y=pdfSeccion(doc,y,'Descripción de trabajos');
  doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(20,20,20);
  const lines=doc.splitTextToSize(o.trabajos||'',W-30);
  y=pdfCheckPage(doc,y,lines.length*5+8,TI2,'REMITO',`OT-${o.numero||'?'}`);
  doc.text(lines,16,y);y+=lines.length*5+6;

  // Items mano de obra
  if(mo.length){
    y=pdfCheckPage(doc,y,16,TI2,'REMITO',`OT-${o.numero||'?'}`);
    y=pdfSeccion(doc,y,'Mano de obra');
    mo.forEach(it=>{
      y=pdfCheckPage(doc,y,10,TI2,'REMITO',`OT-${o.numero||'?'}`);
      doc.setFillColor(248,250,252);doc.rect(14,y-4,W-28,7,'F');
      doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(20,20,20);
      const descTrunc=doc.splitTextToSize(it.desc||'',W-80)[0];
      doc.text(descTrunc,16,y);
      doc.text((it.cantidad||1)+' × $ '+parseFloat(it.precio||0).toLocaleString('es-AR'),W-14,y,{align:'right'});
      doc.setDrawColor(220,228,235);doc.line(14,y+2,W-14,y+2);y+=8;
    });
    doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(cr,cg,cb);
    doc.text('Subtotal mano de obra: $ '+sumItems(mo).toLocaleString('es-AR',{minimumFractionDigits:0}),W-14,y,{align:'right'});y+=8;
  }

  // Items repuestos taller
  if(rt.length){
    y=pdfCheckPage(doc,y,16,TI2,'REMITO',`OT-${o.numero||'?'}`);
    y=pdfSeccion(doc,y,'Repuestos del taller');
    rt.forEach(it=>{
      y=pdfCheckPage(doc,y,10,TI2,'REMITO',`OT-${o.numero||'?'}`);
      doc.setFillColor(248,250,252);doc.rect(14,y-4,W-28,7,'F');
      doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(20,20,20);
      const descTrunc=doc.splitTextToSize(it.desc||'',W-80)[0];
      doc.text(descTrunc,16,y);
      doc.text((it.cantidad||1)+' × $ '+parseFloat(it.precio||0).toLocaleString('es-AR'),W-14,y,{align:'right'});
      doc.setDrawColor(220,228,235);doc.line(14,y+2,W-14,y+2);y+=8;
    });
    doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(cr,cg,cb);
    doc.text('Subtotal repuestos: $ '+sumItems(rt).toLocaleString('es-AR',{minimumFractionDigits:0}),W-14,y,{align:'right'});y+=8;
  }

  // Items repuestos del cliente
  if(re.length){
    y=pdfCheckPage(doc,y,16,TI2,'REMITO',`OT-${o.numero||'?'}`);
    y=pdfSeccion(doc,y,'Repuestos externos al taller',[180,120,20]);
    re.forEach(it=>{
      y=pdfCheckPage(doc,y,10,TI2,'REMITO',`OT-${o.numero||'?'}`);
      doc.setFillColor(255,248,240);doc.rect(14,y-4,W-28,7,'F');
      doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(20,20,20);
      const descTrunc=doc.splitTextToSize(it.desc||'',W-80)[0];
      doc.text(descTrunc,16,y);
      doc.text((it.cantidad||1)+' × $ '+parseFloat(it.precio||0).toLocaleString('es-AR'),W-14,y,{align:'right'});
      doc.setDrawColor(220,228,235);doc.line(14,y+2,W-14,y+2);y+=8;
    });y+=2;
  }

  // Checklist de mantenimientos
  const marcados=Object.keys(chk).filter(k=>chk[k]);
  if(marcados.length){
    const rowHchk=7;const needed=marcados.length*rowHchk+16;
    y=pdfCheckPage(doc,y,needed,TI2,'REMITO',`OT-${o.numero||'?'}`);
    y=pdfSeccion(doc,y,'Mantenimientos realizados');
    marcados.forEach(k=>{
      y=pdfCheckPage(doc,y,rowHchk+2,TI2,'REMITO',`OT-${o.numero||'?'}`);
      doc.setFillColor(235,250,235);doc.roundedRect(14,y-4,W-28,rowHchk,1.5,1.5,'F');
      doc.setDrawColor(100,180,100);doc.roundedRect(14,y-4,W-28,rowHchk,1.5,1.5,'D');
      doc.setFillColor(34,197,94);doc.roundedRect(17,y-2.5,5,5,1,1,'F');
      doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(255,255,255);
      doc.text('✓',18,y+0.8);
      doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(20,20,20);
      const label=(k||'').normalize('NFC');
      doc.text(label,24,y+0.8);
      y+=rowHchk+1.5;
    });y+=3;
  }

  // Observaciones
  if(o.obs){
    y=pdfCheckPage(doc,y,20,TI2,'REMITO',`OT-${o.numero||'?'}`);
    y=pdfSeccion(doc,y,'Observaciones',[80,100,120]);
    doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(30,30,30);
    const obsLines=doc.splitTextToSize(o.obs,W-30);
    y=pdfCheckPage(doc,y,obsLines.length*5+8,TI2,'REMITO',`OT-${o.numero||'?'}`);
    doc.text(obsLines,16,y);y+=obsLines.length*5+6;
  }

  // TOTAL
  y=pdfCheckPage(doc,y,24,TI2,'REMITO',`OT-${o.numero||'?'}`);
  y+=2;y=pdfTotal(doc,y,o.total,'TOTAL A COBRAR');
  // Adelanto y saldo
  if(o.adelanto_cliente>0){
    y=pdfCheckPage(doc,y,20,TI2,'REMITO',`OT-${o.numero||'?'}`);
    const saldo=Math.max(0,(o.total||0)-(o.adelanto_cliente||0));
    const hw=(W-28)/2;
    doc.setFillColor(220,245,220);doc.roundedRect(14,y,hw-3,14,3,3,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(30,100,30);
    doc.text('ADELANTO RECIBIDO',16,y+5);
    doc.setFontSize(12);doc.text('$ '+parseFloat(o.adelanto_cliente).toLocaleString('es-AR',{minimumFractionDigits:0}),16+hw/2,y+12,{align:'center'});
    doc.setFillColor(255,235,200);doc.roundedRect(14+hw+2,y,hw-2,14,3,3,'F');
    doc.setFontSize(9);doc.setTextColor(180,80,0);
    doc.text('SALDO A COBRAR',16+hw+4,y+5);
    doc.setFontSize(12);doc.text('$ '+saldo.toLocaleString('es-AR',{minimumFractionDigits:0}),14+hw+2+hw/2,y+12,{align:'center'});
    y+=20;
  }

  pdfAddPageNumbers(doc);
  doc.save(`Remito_OT${o.numero||''}_${o.patente}.pdf`);toast('PDF generado ✓');
}

async function genRecepcion(ingId){
  ld(true);
  const [IS,CS,TI2]=await Promise.all([api('GET','/api/ingresos'),apiCached('/api/clientes'),api('GET','/api/taller/info')]);
  const i=IS.find(x=>x.id===ingId);ld(false);if(!i){toast('No encontrado');return;}
  const c=i.cliente_id?CS.find(x=>x.id===i.cliente_id):null;
  const doc=new jsPDF();const W=doc.internal.pageSize.getWidth();
  const [cr,cg,cb]=getPDFColor();
  let y=pdfHeader(doc,TI2,'RECEPCIÓN DE VEHÍCULO',`R-${i.numero||'?'}`);

  // Bloque datos
  y=pdfSeccion(doc,y,'Datos del vehículo y cliente');
  y=pdfLinea(doc,y,'Patente',i.patente,W);
  const vDesc=[i.marca,i.modelo,i.anio].filter(Boolean).join(' ');
  if(vDesc)y=pdfLinea(doc,y,'Vehículo',vDesc,W);
  if(c){
    y=pdfLinea(doc,y,'Cliente',c.nombre,W);
    if(c.dni)y=pdfLinea(doc,y,'DNI / CUIL',c.dni,W);
    if(c.telefono)y=pdfLinea(doc,y,'Teléfono',c.telefono,W);
    if(c.email)y=pdfLinea(doc,y,'Email',c.email,W);
  }
  y=pdfLinea(doc,y,'Fecha de ingreso',fd(i.fecha),W);
  if(i.km)y=pdfLinea(doc,y,'Kilometraje al ingreso',parseInt(i.km).toLocaleString()+' km',W);
  y=pdfLinea(doc,y,'Estado general del vehículo',(i.estado||'bueno').charAt(0).toUpperCase()+(i.estado||'bueno').slice(1),W);
  y+=4;

  // Fluidos
  y=pdfCheckPage(doc,y,40,TI2,'RECEPCIÓN DE VEHÍCULO',`R-${i.numero||'?'}`);
  y=pdfSeccion(doc,y,'Estado de fluidos al ingreso');
  const fluidos=[['Aceite motor',i.aceite],['Refrigerante',i.refrigerante],['Frenos (pastillas)',i.frenos],['Líquido de frenos',i.liq_frenos||'ok']];
  const colW=(W-28)/2;let fx2=16,fy2=y;
  fluidos.forEach(([lbl,val],idx2)=>{
    const xPos=fx2+(idx2%2)*colW;const yPos=fy2+Math.floor(idx2/2)*14;
    const isOk=val==='ok';const col=isOk?[29,158,117]:val==='bajo'?[239,159,39]:[200,50,50];
    doc.setDrawColor(col[0],col[1],col[2]);
    doc.setFillColor(isOk?col[0]:255,isOk?col[1]:255,isOk?col[2]:255);
    doc.roundedRect(xPos,yPos-3.5,5,5,1,1,isOk?'FD':'D');

    doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(30,30,30);
    doc.text(lbl,xPos+7,yPos);
    doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(col[0],col[1],col[2]);
    doc.text((val||'ok').toUpperCase(),xPos+7+doc.getTextWidth(lbl)+2,yPos);
  });
  y=fy2+Math.ceil(fluidos.length/2)*14+4;

  // Trabajos a realizar
  y=pdfCheckPage(doc,y,20,TI2,'RECEPCIÓN DE VEHÍCULO',`R-${i.numero||'?'}`);
  y=pdfSeccion(doc,y,'Trabajos solicitados / a realizar');
  doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(30,30,30);
  const lsTrab=doc.splitTextToSize(i.trabajos||'',W-30);
  y=pdfCheckPage(doc,y,lsTrab.length*5+8,TI2,'RECEPCIÓN DE VEHÍCULO',`R-${i.numero||'?'}`);
  doc.text(lsTrab,16,y);y+=lsTrab.length*5+6;

  // Observaciones / daños
  if(i.obs){
    y=pdfCheckPage(doc,y,20,TI2,'RECEPCIÓN DE VEHÍCULO',`R-${i.numero||'?'}`);
    y=pdfSeccion(doc,y,'Observaciones / daños preexistentes',[80,100,120]);
    const ls2=doc.splitTextToSize(i.obs,W-30);
    y=pdfCheckPage(doc,y,ls2.length*5+8,TI2,'RECEPCIÓN DE VEHÍCULO',`R-${i.numero||'?'}`);
    doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(30,30,30);
    doc.text(ls2,16,y);y+=ls2.length*5+8;
  }

  // Fotos
  const fotos=JSON.parse(i.fotos||'[]').slice(0,4);
  if(fotos.length){
    y=pdfCheckPage(doc,y,50,TI2,'RECEPCIÓN DE VEHÍCULO',`R-${i.numero||'?'}`);

    y=fy+40;
  }

  // ── DECLARACIÓN Y CONFORMIDAD ──
  y=pdfCheckPage(doc,y,90,TI2,'RECEPCIÓN DE VEHÍCULO',`R-${i.numero||'?'}`);
  y+=4;
  doc.setFillColor(245,245,250);doc.rect(14,y-3,W-28,2,'F');

    'El/la abajo firmante declara conocer y aceptar las siguientes condiciones al momento de dejar el vehículo en el taller:\n\n'+
    '1. ESTADO DEL VEHÍCULO: El cliente confirma que el vehículo ingresa con el estado de carrocería, tapizado, accesorios '+
    'y fluidos descriptos en este documento. El taller no se responsabiliza por daños o faltantes preexistentes no declarados '+
    'en el presente formulario.\n\n'+
    '2. AUTORIZACIÓN DE TRABAJOS: El cliente autoriza expresamente al taller a realizar los trabajos indicados en este '+
    'documento. Cualquier trabajo adicional que surja durante la revisión será consultado con el cliente antes de realizarse.\n\n'+
    '3. PRUEBA DE MANEJO: El cliente autoriza al personal técnico del taller a conducir el vehículo dentro del establecimiento '+
    'o en la vía pública en la medida estrictamente necesaria para verificar el funcionamiento del vehículo antes, durante y '+
    'después de los trabajos realizados. Dicha prueba se llevará a cabo con la debida precaución y por personal habilitado.\n\n'+
    '4. OBJETOS DE VALOR: El taller no se responsabiliza por objetos, documentos o pertenencias personales dejados en el '+
    'interior del vehículo. Se recomienda al cliente retirarlos antes de dejar la unidad.\n\n'+
    '5. CONFORMIDAD AL RETIRO: Al momento de retirar el vehículo, el cliente presta conformidad con los trabajos realizados '+
    'y el monto cobrado, quedando el taller eximido de reclamos posteriores por los conceptos abonados.';

  const confLines=doc.splitTextToSize(textConformidad,W-32);
  doc.text(confLines,16,y);y+=confLines.length*3.8+6;

  // Importe estimado
  y+=2;
  doc.setFillColor(240,248,240);doc.rect(14,y-3,W-28,10,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(40,100,40);
  doc.text('IMPORTE ESTIMADO A COBRAR:',16,y+3);
  doc.text('$ ____________________________',W-14,y+3,{align:'right'});
  doc.setDrawColor(180,220,180);doc.rect(14,y-3,W-28,10,'D');
  y+=18;

  // Firmas
  y=pdfCheckPage(doc,y,40,TI2,'RECEPCIÓN DE VEHÍCULO',`R-${i.numero||'?'}`);
  doc.setDrawColor(150,150,150);
  doc.line(16,y+14,90,y+14);
  doc.line(W-90,y+14,W-16,y+14);
  doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(60,60,60);
  doc.text('Firma y aclaración del CLIENTE',16,y+20);
  doc.text('Firma y sello del TALLER',W-90,y+20);
  doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(120,120,120);
  doc.text('Nombre: ____________________________',16,y+27);
  doc.text('Nombre: ____________________________',W-90,y+27);
  doc.text('DNI: _______________   Fecha: ___/___/______',16,y+34);
  doc.text('Fecha: ___/___/______',W-90,y+34);

  pdfAddPageNumbers(doc);

}

// ── HISTORIAL ───────────────────────────────────────────────────────────────
async function genHist(patente){
  ld(true);
  const [VD,TI2]=await Promise.all([api('GET',`/api/vehiculos/${patente}`),api('GET','/api/taller/info')]);
  ld(false);if(!VD){toast('No encontrado');return;}
  const ingresos=VD.ingresos||[];const ordenes=VD.ordenes||[];
  const doc=new jsPDF();const W=doc.internal.pageSize.getWidth();
  const [cr,cg,cb]=getPDFColor();
  let y=pdfHeader(doc,TI2,'HISTORIAL DEL VEHÍCULO',patente);

  y=pdfSeccion(doc,y,'Datos del vehículo');
  y=pdfLinea(doc,y,'Patente',patente,W);
  const vDesc=[VD.marca,VD.modelo,VD.anio].filter(Boolean).join(' ');
  if(vDesc)y=pdfLinea(doc,y,'Vehículo',vDesc,W);
  if(VD.cliente_nombre)y=pdfLinea(doc,y,'Propietario',VD.cliente_nombre+(VD.cliente_tel?' — Tel: '+VD.cliente_tel:''),W);
  if(VD.ultimo_km)y=pdfLinea(doc,y,'Último kilometraje registrado',parseInt(VD.ultimo_km).toLocaleString()+' km',W);
  if(VD.proximo_aceite)y=pdfLinea(doc,y,'Próximo cambio de aceite',parseInt(VD.proximo_aceite).toLocaleString()+' km',W);
  y+=6;

  // Órdenes de trabajo
  if(ordenes.length){
    y=pdfCheckPage(doc,y,16,TI2,'HISTORIAL DEL VEHÍCULO',patente);
    y=pdfSeccion(doc,y,`Órdenes de trabajo (${ordenes.length})`);
    ordenes.forEach(o=>{
      const lsTrab=doc.splitTextToSize(o.trabajos||'',W-34);
      const alturaItem=7+lsTrab.length*4.5+8;
      y=pdfCheckPage(doc,y,alturaItem,TI2,'HISTORIAL DEL VEHÍCULO',patente);
      doc.setFillColor(248,248,248);doc.rect(14,y-4,W-28,7,'F');
      doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(cr,cg,cb);
      doc.text(`OT-${o.numero||'?'} — ${fd(o.fecha)}`,16,y);
      if(o.total){doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(cr,cg,cb);doc.text('$ '+parseFloat(o.total).toLocaleString('es-AR',{minimumFractionDigits:0}),W-14,y,{align:'right'});}
      y+=6;
      doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(60,60,60);
      doc.text(lsTrab,18,y);y+=lsTrab.length*4.5+6;
    });
  }

  // Recepciones
  if(ingresos.length){
    y+=2;
    y=pdfCheckPage(doc,y,16,TI2,'HISTORIAL DEL VEHÍCULO',patente);
    y=pdfSeccion(doc,y,`Recepciones (${ingresos.length})`);
    ingresos.forEach(i=>{
      const lsTrab=doc.splitTextToSize(i.trabajos||'',W-34);
      const alturaItem=7+lsTrab.length*4.5+7;
      y=pdfCheckPage(doc,y,alturaItem,TI2,'HISTORIAL DEL VEHÍCULO',patente);
      doc.setFillColor(248,250,252);doc.rect(14,y-4,W-28,7,'F');
      doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(cr,cg,cb);
      doc.text(`R-${i.numero||'?'} — ${fd(i.fecha)}${i.km?' — '+parseInt(i.km).toLocaleString()+' km':''}`,16,y);y+=6;
      doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(60,60,60);
      doc.text(lsTrab,18,y);y+=lsTrab.length*4.5+5;
    });
  }

  pdfAddPageNumbers(doc);
  doc.save(`Historial_${patente}.pdf`);toast('PDF generado ✓');
}

// ── PRESUPUESTO ─────────────────────────────────────────────────────────────
async function genPDFPres(presId){
  ld(true);
  const [PS,CS,TI2]=await Promise.all([api('GET','/api/presupuestos'),apiCached('/api/clientes'),api('GET','/api/taller/info')]);
  const p=PS.find(x=>x.id===presId);ld(false);if(!p){toast('No encontrado');return;}
  const items=JSON.parse(p.items||'[]');const c=p.cliente_id?CS.find(x=>x.id===p.cliente_id):null;
  const doc=new jsPDF();const W=doc.internal.pageSize.getWidth();
  const [cr,cg,cb]=getPDFColor();
  let y=pdfHeader(doc,TI2,'PRESUPUESTO',`P-${p.numero||'?'}`);

  // Bloque taller + cliente
  const midX=W/2;
  doc.setFillColor(248,248,248);doc.rect(14,y,midX-18,32,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(cr,cg,cb);doc.text('TALLER',16,y+7);
  doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(30,30,30);
  doc.text(TI2.nombre||'',16,y+14);
  if(TI2.direccion)doc.text(TI2.direccion,16,y+20);
  if(TI2.telefono)doc.text('Tel: '+TI2.telefono,16,y+26);
  if(TI2.email)doc.text(TI2.email,16,y+31);

  doc.setFillColor(255,248,248);doc.rect(midX-2,y,midX-12,32,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(cr,cg,cb);doc.text('CLIENTE',midX,y+7);
  doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(30,30,30);
  if(c){
    doc.text(c.nombre||'',midX,y+14);
    if(c.dni)doc.text('DNI: '+c.dni,midX,y+20);
    if(c.telefono)doc.text('Tel: '+c.telefono,midX,y+(c.dni?26:20));
  } else {
    doc.text('Sin cliente registrado',midX,y+14);
  }
  y+=38;

  y=pdfSeccion(doc,y,'Datos del presupuesto');
  y=pdfLinea(doc,y,'Vehículo / Patente',p.patente,W);
  y=pdfLinea(doc,y,'Fecha de emisión',fd(p.fecha),W);
  if(p.fecha_caducidad)y=pdfLinea(doc,y,'Válido hasta',fd(p.fecha_caducidad),W);
  y+=4;

  if(p.descripcion){
    y=pdfCheckPage(doc,y,20,TI2,'PRESUPUESTO',`P-${p.numero||'?'}`);
    y=pdfSeccion(doc,y,'Descripción de trabajos');
    doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(30,30,30);
    const lsDesc=doc.splitTextToSize(p.descripcion,W-30);
    y=pdfCheckPage(doc,y,lsDesc.length*5+8,TI2,'PRESUPUESTO',`P-${p.numero||'?'}`);
    doc.text(lsDesc,16,y);y+=lsDesc.length*5+6;
  }

  // Tabla de ítems
  y=pdfCheckPage(doc,y,20,TI2,'PRESUPUESTO',`P-${p.numero||'?'}`);
  y=pdfSeccion(doc,y,'Detalle del presupuesto');
  // Encabezado tabla
  doc.setFillColor(cr,cg,cb);doc.rect(14,y-4,W-28,8,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(255,255,255);
  doc.text('Descripción',16,y+1);
  doc.text('Cant.',112,y+1,{align:'right'});
  doc.text('Precio unit.',148,y+1,{align:'right'});
  doc.text('Subtotal',W-14,y+1,{align:'right'});
  y+=8;

  // Anchos de columnas fijos para que desc nunca se salga
  const colDesc=16,colCant=112,colPU=148,colSub=W-14;
  const maxDescW=colCant-colDesc-4;
  items.forEach((it,idx)=>{
    const descLines=doc.splitTextToSize(it.desc||'',maxDescW);
    const rowH=Math.max(8,descLines.length*5+4);
    y=pdfCheckPage(doc,y,rowH+4,TI2,'PRESUPUESTO',`P-${p.numero||'?'}`);
    doc.setFillColor(idx%2===0?248:255,idx%2===0?250:255,idx%2===0?252:255);
    doc.rect(14,y-4,W-28,rowH,'F');
    doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(20,20,20);
    doc.text(descLines,colDesc,y);
    doc.text(String(it.cantidad||1),colCant,y,{align:'right'});
    doc.text('$ '+parseFloat(it.precio||0).toLocaleString('es-AR'),colPU,y,{align:'right'});
    doc.setFont('helvetica','bold');
    doc.text('$ '+parseFloat((it.cantidad||1)*(it.precio||0)).toLocaleString('es-AR'),colSub,y,{align:'right'});
    doc.setDrawColor(220,228,235);doc.line(14,y-4+rowH,W-14,y-4+rowH);
    y+=rowH;
  });

  // Total
  y+=4;
  y=pdfCheckPage(doc,y,24,TI2,'PRESUPUESTO',`P-${p.numero||'?'}`);
  pdfTotal(doc,y,p.total,'TOTAL A PAGAR');
  y+=20;

  // Observaciones con salto de línea correcto
  if(p.obs){
    y=pdfCheckPage(doc,y,20,TI2,'PRESUPUESTO',`P-${p.numero||'?'}`);
    y=pdfSeccion(doc,y,'Observaciones',[80,100,120]);
    doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(30,30,30);
    const obsLines=doc.splitTextToSize(p.obs,W-32);
    y=pdfCheckPage(doc,y,obsLines.length*5+6,TI2,'PRESUPUESTO',`P-${p.numero||'?'}`);
    doc.text(obsLines,16,y);y+=obsLines.length*5+6;
  }

  // Nota de validez
  y+=2;
  y=pdfCheckPage(doc,y,16,TI2,'PRESUPUESTO',`P-${p.numero||'?'}`);
  doc.setFont('helvetica','italic');doc.setFontSize(7.5);doc.setTextColor(140,140,140);
  const notaValidez='Este presupuesto tiene carácter informativo y no implica compromiso de ejecución hasta su aprobación por escrito. '+
    'Los precios están sujetos a variación según disponibilidad de repuestos al momento de la reparación.';
  const notaLines=doc.splitTextToSize(notaValidez,W-28);
  doc.text(notaLines,14,y);

  pdfAddPageNumbers(doc);
  doc.save(`Presupuesto_P${p.numero||''}_${p.patente}.pdf`);toast('PDF generado ✓');
}

// ── BALANCE ─────────────────────────────────────────────────────────────────
async function genBalancePDF(){
  const desde=($('bal-desde')||{value:''}).value;const hasta=($('bal-hasta')||{value:''}).value;
  if(!desde||!hasta){toast('Seleccioná un rango');return;}
  ld(true);
  const [M,GF,TI2]=await Promise.all([api('GET','/api/movimientos'),apiCached('/api/gastos-fijos'),api('GET','/api/taller/info')]);
  ld(false);
  const filtrados=M.filter(m=>m.fecha&&m.fecha>=desde&&m.fecha<=hasta);
  const ingresos=filtrados.filter(m=>m.tipo==='ingreso');const egresos=filtrados.filter(m=>m.tipo==='egreso');
  const totalIng=ingresos.reduce((a,m)=>a+m.monto,0);const totalEg=egresos.reduce((a,m)=>a+m.monto,0);
  const gfMensual=GF.reduce((a,g)=>a+g.monto,0);
  const meses=Math.max(1,Math.round((new Date(hasta)-new Date(desde))/(1000*60*60*24*30)));
  const gfPeriodo=gfMensual*meses;const balance=totalIng-totalEg-gfPeriodo;
  const [cr,cg,cb]=getPDFColor();
  const doc=new jsPDF();const W=doc.internal.pageSize.getWidth();
  let y=pdfHeader(doc,TI2,'BALANCE ECONÓMICO','');
  doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(100,120,150);
  doc.text(`Período: ${fd(desde)} al ${fd(hasta)}`,W/2,y,{align:'center'});y+=10;

  y=pdfSeccion(doc,y,'Resumen');
  y=pdfLinea(doc,y,'Ingresos brutos','$ '+totalIng.toLocaleString('es-AR',{minimumFractionDigits:0}),W);
  y=pdfLinea(doc,y,'Egresos variables','$ '+totalEg.toLocaleString('es-AR',{minimumFractionDigits:0}),W);
  y=pdfLinea(doc,y,'Gastos fijos ('+meses+' mes/es)','$ '+gfPeriodo.toLocaleString('es-AR',{minimumFractionDigits:0}),W);
  y+=4;pdfTotal(doc,y,balance,'BALANCE REAL');y+=20;

  if(ingresos.length){
    y=pdfCheckPage(doc,y,16,TI2,'BALANCE ECONÓMICO','');
    y=pdfSeccion(doc,y,'Detalle ingresos');
    ingresos.forEach(m=>{
      y=pdfCheckPage(doc,y,10,TI2,'BALANCE ECONÓMICO','');
      doc.setFillColor(245,252,245);doc.rect(14,y-4,W-28,7,'F');
      doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(30,30,30);
      doc.text(fd(m.fecha)+'  '+(m.descripcion||m.categoria),16,y);
      doc.setTextColor(20,140,20);doc.text('+ $ '+parseFloat(m.monto).toLocaleString('es-AR'),W-14,y,{align:'right'});
      doc.setDrawColor(220,228,235);doc.line(14,y+2,W-14,y+2);y+=7;
    });y+=4;
  }
  if(egresos.length){
    y=pdfCheckPage(doc,y,16,TI2,'BALANCE ECONÓMICO','');
    y=pdfSeccion(doc,y,'Detalle egresos',[cr,cg,cb]);
    egresos.forEach(m=>{
      y=pdfCheckPage(doc,y,10,TI2,'BALANCE ECONÓMICO','');
      doc.setFillColor(252,245,245);doc.rect(14,y-4,W-28,7,'F');
      doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(30,30,30);
      doc.text(fd(m.fecha)+'  '+(m.descripcion||m.categoria),16,y);
      doc.setTextColor(cr,cg,cb);doc.text('- $ '+parseFloat(m.monto).toLocaleString('es-AR'),W-14,y,{align:'right'});
      doc.setDrawColor(220,228,235);doc.line(14,y+2,W-14,y+2);y+=7;
    });
  }
  pdfAddPageNumbers(doc);
  doc.save(`Balance_${desde}_${hasta}.pdf`);toast('PDF generado ✓');
}

// ── ALERTAS ─────────────────────────────────────────────────────────────────
async function genAlertasPDF(){
  ld(true);const [AL,TI2]=await Promise.all([api('GET','/api/alertas'),api('GET','/api/taller/info')]);ld(false);
  const doc=new jsPDF();const W=doc.internal.pageSize.getWidth();
  const [cr,cg,cb]=getPDFColor();
  let y=pdfHeader(doc,TI2,'ALERTAS ACTIVAS','');
  doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(100,120,150);
  doc.text(`${AL.length} alerta${AL.length!==1?'s':''} — ${fd(td())}`,W/2,y,{align:'center'});y+=10;

  if(!AL.length){doc.text('Sin alertas activas.',W/2,y+20,{align:'center'});pdfAddPageNumbers(doc);doc.save('Alertas.pdf');toast('PDF generado ✓');return;}

  AL.forEach(a=>{
    const rowH=a.notas?26:18;
    y=pdfCheckPage(doc,y,rowH+4,TI2,'ALERTAS ACTIVAS','');
    doc.setFillColor(248,248,248);doc.roundedRect(14,y-4,W-28,rowH,3,3,'F');
    doc.setFillColor(cr,cg,cb);doc.roundedRect(14,y-4,4,rowH,2,2,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(30,30,30);
    doc.text(a.patente,20,y+2);
    if(a.fecha_alerta){doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(100,100,100);doc.text('Fecha: '+fd(a.fecha_alerta),65,y+2);}
    if(a.telefono_dueno){doc.setTextColor(cr,cg,cb);doc.text('Tel: '+a.telefono_dueno,120,y+2);}
    if(a.aceite_usado){doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(80,80,20);doc.text('Aceite: '+a.aceite_usado,20,y+9);}
    if(a.filtros_cambiados){doc.setTextColor(60,80,100);doc.text('Filtros: '+a.filtros_cambiados,20,y+(a.aceite_usado?16:9));}
    if(a.notas){doc.setFont('helvetica','italic');doc.setFontSize(8);doc.setTextColor(80,80,80);doc.text(a.notas,20,y+20);}
    y+=rowH+4;
  });
  pdfAddPageNumbers(doc);
  doc.save('Alertas_programadas.pdf');toast('PDF generado ✓');
}
